# =============================================================================
# LiteLLM Proxy Configuration for Decepticon
# =============================================================================
# This file configures the LiteLLM Proxy server as the central LLM gateway.
#
# Model names use LiteLLM provider-prefix format (e.g., "anthropic/claude-opus-4-7")
# matching the names in decepticon/llm/models.py. Agents send these names directly;
# the proxy resolves them to the correct provider endpoint + API key.
#
# Features:
#   - Model routing: provider-prefix names map to actual API endpoints
#   - Load balancing: multiple entries per model_name for redundancy
#   - Usage tracking: logs all API calls with cost data
#   - Budget management: per-key spending limits
#   - Rate limiting: per-key RPM/TPM controls
#
# Docs: https://docs.litellm.ai/docs/proxy/configs

# --- Model Definitions ---
# model_name must match the constants in decepticon/llm/models.py exactly.

model_list:
  # ── Anthropic ────────────────────────────────────────────────────────
  - model_name: anthropic/claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI ───────────────────────────────────────────────────────────
  # HIGH tier
  - model_name: openai/gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_key: os.environ/OPENAI_API_KEY

  # MID tier
  - model_name: openai/gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  # LOW tier
  - model_name: openai/gpt-5-nano
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY

  # ── Google ───────────────────────────────────────────────────────────
  # HIGH tier
  - model_name: gemini/gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # MID tier
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # LOW tier
  - model_name: gemini/gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # ── MiniMax ──────────────────────────────────────────────────────────
  # Native LiteLLM minimax/ provider — registry-registered model IDs.
  # HIGH tier
  - model_name: minimax/MiniMax-M2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY

  # MID tier (throughput-tuned variant of M2.5 — 2x output token cost,
  # higher rate ceiling)
  - model_name: minimax/MiniMax-M2.5-lightning
    litellm_params:
      model: minimax/MiniMax-M2.5-lightning
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY

  # ── Claude Code Auth (OAuth subscription) ────────────────────────────
  - model_name: auth/claude-opus-4-7
    litellm_params:
      model: auth/claude-opus-4-7

  - model_name: auth/claude-sonnet-4-6
    litellm_params:
      model: auth/claude-sonnet-4-6

  - model_name: auth/claude-haiku-4-5
    litellm_params:
      model: auth/claude-haiku-4-5

  # ── DeepSeek ─────────────────────────────────────────────────────────
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── xAI (Grok) ──────────────────────────────────────────────────────
  - model_name: xai/grok-3
    litellm_params:
      model: xai/grok-3
      api_key: os.environ/XAI_API_KEY

  - model_name: xai/grok-3-mini
    litellm_params:
      model: xai/grok-3-mini
      api_key: os.environ/XAI_API_KEY

  # ── Mistral ──────────────────────────────────────────────────────────
  - model_name: mistral/mistral-large-latest
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral/codestral-latest
    litellm_params:
      model: mistral/codestral-latest
      api_key: os.environ/MISTRAL_API_KEY

  # ── OpenRouter ─────────────────────────────────────────────────────
  - model_name: openrouter/anthropic/claude-opus-4-7
    litellm_params:
      model: openrouter/anthropic/claude-opus-4-7
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/anthropic/claude-sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/anthropic/claude-haiku-4-5
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4-5
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Nvidia NIM ─────────────────────────────────────────────────────
  - model_name: nvidia_nim/meta/llama-3.3-70b-instruct
    litellm_params:
      model: nvidia_nim/meta/llama-3.3-70b-instruct
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: nvidia_nim/nvidia/llama-3.1-nemotron-70b-instruct
    litellm_params:
      model: nvidia_nim/nvidia/llama-3.1-nemotron-70b-instruct
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: nvidia_nim/meta/llama-3.2-3b-instruct
    litellm_params:
      model: nvidia_nim/meta/llama-3.2-3b-instruct
      api_key: os.environ/NVIDIA_API_KEY

  # ── ChatGPT OAuth (subscription) ─────────────────────────────────────
  - model_name: chatgpt/gpt-4o
    litellm_params:
      model: chatgpt/gpt-4o

  - model_name: chatgpt/o1
    litellm_params:
      model: chatgpt/o1

  - model_name: chatgpt/o3-mini
    litellm_params:
      model: chatgpt/o3-mini

  # ── Gemini Advanced subscription ───────────────────────────────────
  - model_name: gemini-sub/gemini-2.5-pro
    litellm_params:
      model: gemini-sub/gemini-2.5-pro

  - model_name: gemini-sub/gemini-2.5-flash
    litellm_params:
      model: gemini-sub/gemini-2.5-flash

  # ── Copilot Pro subscription ─────────────────────────────────────
  - model_name: copilot/gpt-4o
    litellm_params:
      model: copilot/gpt-4o

  - model_name: copilot/o1
    litellm_params:
      model: copilot/o1

  # ── SuperGrok subscription ──────────────────────────────────────
  - model_name: grok-sub/grok-3
    litellm_params:
      model: grok-sub/grok-3

  - model_name: grok-sub/grok-3-mini
    litellm_params:
      model: grok-sub/grok-3-mini

  # ── Perplexity Pro subscription ─────────────────────────────────
  - model_name: pplx-sub/sonar-pro
    litellm_params:
      model: pplx-sub/sonar-pro

  - model_name: pplx-sub/sonar
    litellm_params:
      model: pplx-sub/sonar

  # ── Local LLM (Ollama) ──────────────────────────────────────────────
  - model_name: ollama/llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  custom_provider_map:
    - provider: "auth"
      custom_handler: claude_code_handler.claude_code_handler_instance
    - provider: "chatgpt"
      custom_handler: chatgpt_handler.chatgpt_handler_instance
    - provider: "gemini-sub"
      custom_handler: gemini_handler.gemini_sub_handler_instance
    - provider: "copilot"
      custom_handler: copilot_handler.copilot_handler_instance
    - provider: "grok-sub"
      custom_handler: grok_handler.grok_sub_handler_instance
    - provider: "pplx-sub"
      custom_handler: perplexity_handler.perplexity_sub_handler_instance
  fallbacks:
    - {"auth/claude-opus-4-7": ["auth/claude-sonnet-4-6"]}
    - {"auth/claude-sonnet-4-6": ["auth/claude-haiku-4-5"]}
  num_retries: 3
  retry_after: 30

# --- Router Settings ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 5
  timeout: 300
  retry_after: 30
  allowed_fails: 3
  cooldown_time: 60

# --- General Settings ---
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
